services:
  postgres:
    image: postgres:16
    container_name: clout-clicker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clout_clicker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - clout_clicker_postgres_data:/var/lib/postgresql/data

volumes:
  clout_clicker_postgres_data:
